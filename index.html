<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Школьный Портал (VK/TG Edition)</title>

    <!-- Подключаем шрифты -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-light: #f0f2f5;
            --panel-bg-light: rgba(255, 255, 255, 0.9);
            --sber-green: #00b372;
            --vtb-blue: #00aaff;
            --tg-blue: #24a1de;
            --discord-purple: #7289da;
            --text-dark: #2c2d2e;
            --text-muted-dark: #666e7a;
            --border-light: #d8dee7;
            --header-bg: rgba(240, 242, 245, 0.9);
            --shadow-light: rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Splash Screen */
        #splashScreen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg-light); z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .spinner { width: 60px; height: 60px; border: 4px solid rgba(0,170,255,0.1); border-top: 4px solid var(--vtb-blue); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Auth Screen */
        #authScreen {
            max-width: 420px; width: 90%; margin: auto;
            background: var(--panel-bg-light); backdrop-filter: blur(10px);
            border: 1px solid var(--border-light); border-radius: 16px;
            padding: 32px; box-shadow: 0 4px 20px var(--shadow-light);
            text-align: center; display: none;
        }
        .auth-title {
            font-size: 24px; font-weight: 700;
            background: linear-gradient(45deg, var(--vtb-blue), var(--sber-green));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 24px;
        }
        .form-group { margin-bottom: 16px; text-align: left; }
        .form-group label {
            display: block; font-size: 12px; font-weight: 600; color: var(--text-muted-dark);
            margin-bottom: 6px; text-transform: uppercase;
        }
        .form-control {
            width: 100%; padding: 12px 14px; background: rgba(255,255,255,0.7);
            border: 1px solid var(--border-light); border-radius: 10px;
            color: var(--text-dark); font-size: 14px; outline: none;
        }
        .btn-action {
            background: linear-gradient(135deg, var(--vtb-blue), var(--sber-green));
            color: white; border: none; padding: 12px 24px; font-size: 14px;
            font-weight: 600; border-radius: 10px; cursor: pointer; width: 100%;
        }
        .error-msg { color: #ff5555; font-size: 12px; margin-bottom: 16px; display: none; }

        /* Main Interface */
        #mainInterface { display: none; flex-grow: 1; flex-direction: column; }
        header {
            background: var(--panel-bg-light); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-light); padding: 12px 24px;
            display: flex; justify-content: space-between; align-items: center;
            height: 64px; flex-shrink: 0;
        }
        .logo-text { font-weight: 700; font-size: 18px; color: var(--text-dark); letter-spacing: 0.5px; }
        .user-name-gradient {
            font-weight: 600; background: linear-gradient(45deg, var(--vtb-blue), var(--sber-green));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .app-layout {
            display: grid; grid-template-columns: 240px 1fr; height: calc(100vh - 64px);
            max-width: 1200px; margin: 16px auto; border-radius: 16px;
            overflow: hidden; box-shadow: 0 5px 25px rgba(0,0,0,0.1);
        }
        aside {
            background: var(--panel-bg-light); border-right: 1px solid var(--border-light);
            padding: 16px; display: flex; flex-direction: column; gap: 8px;
        }
        .menu-link {
            display: flex; align-items: center; gap: 10px; padding: 10px 12px;
            color: var(--text-muted-dark); text-decoration: none; border-radius: 8px;
            font-size: 14px; font-weight: 500; transition: all 0.2s;
        }
        .menu-link:hover, .menu-link.active {
            background: rgba(0,170,255,0.1); color: var(--vtb-blue);
        }
        main { padding: 0; overflow-y: auto; background-color: var(--bg-light); display: flex; flex-direction: column; flex-grow: 1; }

        /* Chat Container */
        .chat-container {
            display: grid; grid-template-rows: auto 1fr auto; height: 100%;
            background: var(--panel-bg-light); border-radius: 16px;
            border: 1px solid var(--border-light); overflow: hidden;
        }
        .chat-header {
            background: rgba(255,255,255,0.9); padding: 12px 20px;
            border-bottom: 1px solid var(--border-light);
            display: flex; justify-content: space-between; align-items: center;
        }
        .chat-messages {
            padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px;
            background-color: var(--bg-light); flex-grow: 1;
        }
        .msg-bubble {
            max-width: 75%; padding: 10px 14px; border-radius: 14px;
            font-size: 14px; line-height: 1.4; word-wrap: break-word;
        }
        .msg-bubble.my {
            align-self: flex-end; background: linear-gradient(135deg, var(--tg-blue), var(--discord-purple)); color: white;
            border-bottom-right-radius: 4px;
        }
        .msg-bubble-other {
            align-self: flex-start; background: var(--border-light); border-radius: 14px 14px 14px 4px;
        }
        .msg-sender { font-weight: bold; font-size: 11px; color: var(--tg-blue); margin-bottom: 4px; }
        .msg-bubble.my .msg-sender { color: white; }
        .chat-input-area {
            padding: 12px; background: rgba(255,255,255,0.9); display: flex; gap: 10px;
            border-top: 1px solid var(--border-light); align-items: center;
        }
        .chat-input {
            flex-grow: 1; background: var(--bg-light); border: 1px solid var(--border-light);
            border-radius: 24px; padding: 8px 16px; color: var(--text-dark); font-size: 14px; outline: none;
        }

        /* Profile */
        .profile-container {
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            max-width: 500px; margin: 30px auto; background: var(--panel-bg-light);
            padding: 30px; border-radius: 16px; border: 1px solid var(--border-light); box-shadow: 0 4px 15px var(--shadow-light);
        }
        .profile-avatar {
            width: 120px; height: 120px; border-radius: 50%; object-fit: cover;
            border: 4px solid var(--vtb-blue); box-shadow: 0 0 20px rgba(0,170,255,0.4);
        }
        .profile-name { font-size: 22px; font-weight: 700; color: var(--text-dark); }
        .profile-id { font-size: 13px; color: var(--text-muted-dark); margin-top: -10px; }
        .profile-role {
            font-size: 12px; background: var(--sber-green); color: white;
            padding: 4px 8px; border-radius: 5px; margin-top: -15px;
        }
        .profile-bio { font-size: 14px; color: var(--text-dark); text-align: center; }

        /* Admin */
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 20px; }
        .admin-card {
            background: var(--panel-bg-light); border: 1px solid var(--border-light);
            border-radius: 12px; padding: 20px; text-align: left; box-shadow: 0 2px 10px var(--shadow-light);
        }
        .admin-title {
            color: var(--sber-green); font-family: 'Fira Code', monospace;
            font-size: 16px; margin-bottom: 15px; display: flex; justify-content: space-between;
        }
        .log-box {
            background: #0d101a; height: 200px; overflow-y: auto; border-radius: 8px;
            padding: 10px; font-family: 'Fira Code', monospace; font-size: 11px;
            color: var(--sber-green); border: 1px solid rgba(0,179,114,0.2); margin-top: 15px;
        }
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        .admin-table th, .admin-table td { border: 1px solid var(--border-light); padding: 8px; text-align: left; }
        .admin-table th { background-color: var(--border-light); color: var(--text-dark); }

        /* Mobile adjustments */
        @media (max-width: 768px) {
            .app-layout { grid-template-columns: 1fr; height: auto; }
            aside { display: none; } /* Можно сделать выпадающий сайдбар */
            .chat-container { height: calc(100vh - 76px); }
        }
    </style>
</head>
<body>

    <!-- Splash Screen -->
    <div id="splashScreen">
        <div class="spinner"></div>
        <div style="margin-top:12px; color:var(--text-muted-dark);" id="loadStatus">Инициализация системы...</div>
    </div>

    <!-- Auth Screen -->
    <div id="authScreen">
        <div class="auth-title" id="authFormTitle">Вход в систему</div>
        <div class="error-msg" id="authError"></div>
        <form onsubmit="handleAuth(event)">
            <div class="form-group">
                <label>Юзернейм (юз)</label>
                <input type="text" id="username" class="form-control" placeholder="Введи свой ник..." required>
            </div>
            <div class="form-group" id="emailGroup" style="display:none;">
                <label>Электронная почта</label>
                <input type="email" id="email" class="form-control" placeholder="name@yandex.ru">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-action" id="authBtn">Войти</button>
        </form>
        <div style="margin-top:20px; font-size:13px;">
            <span id="toggleText" style="color:var(--vtb-blue); cursor:pointer;" onclick="toggleAuth()">Создать аккаунт</span>
        </div>
    </div>

    <!-- Main Interface -->
    <div id="mainInterface">
        <header>
            <div class="logo-text">«ПОРТАЛ ШКОЛЫ №1»</div>
            <div style="display:flex; align-items:center; gap:12px;">
                <span id="currentUserLabel" class="user-name-gradient">Гость</span>
                <button class="logout-btn" onclick="logout()" style="background:none; border:1px solid rgba(0,0,0,0.1); padding:4px 10px; border-radius:6px; cursor:pointer; color:var(--text-dark);">Выйти</button>
            </div>
        </header>

        <div class="app-layout">
            <aside id="asideMenu">
                <a href="#" class="menu-link active
